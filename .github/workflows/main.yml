name: Unzip Laravel File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip File
        run: |
          if [ -f "laravel.zip" ]; then
            echo "تم العثور على الملف، جاري فك الضغط..."
            unzip -q laravel.zip -d laravel-extracted
            rm laravel.zip
          else
            echo "الملف laravel.zip غير موجود في المسار الرئيسي!"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff-index --quiet HEAD --; then
            echo "لا توجد تغييرات لرفعها."
          else
            git commit -m "تم فك ضغط ملف لارافل بنجاح"
            git push origin main
          fi
