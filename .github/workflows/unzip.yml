name: Unzip Laravel File

on:
  workflow_dispatch: # يتيح لك تشغيل العملية يدوياً بضغطة زر

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip File
        run: |
          unzip laravel.zip -d laravel-extracted
          rm laravel.zip # اختياري: يحذف الملف المضغوط بعد فكه لتوفر مساحة

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "تم فك ضغط ملف laravel تلقائياً"
          git push
          
